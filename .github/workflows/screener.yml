# 평일 하루 4회 — 공공데이터 갱신(영업일 하루 뒤 13:00 KST 이후) 확보 (SPEC 7장)
#
# 왜 4회인가: GitHub Actions 크론은 정시를 보장하지 않는다. 부하가 몰리면
# 지연되거나 아예 스킵된다. 이 리포에서도 07-17 실행은 2시간 2분 지각했고
# 07-20 실행은 통째로 스킵돼 수동 실행해야 했다. 출시 후엔 사용자가 며칠
# 낡은 데이터를 보게 되므로, 한 번 실패해도 같은 날 안에 복구되도록 여러 번
# 시도한다. 이미 최신이면 조기 종료(check_new_data)라 추가 비용은 미미하다.
#
# 분(minute)을 어중간하게 둔 이유: 정각·30분은 전 세계 크론이 몰려 지연·스킵
# 확률이 가장 높은 시간대다.
name: build-screener-json

on:
  schedule:
    - cron: "37 5 * * 1-5" # 14:37 KST
    - cron: "47 7 * * 1-5" # 16:47 KST
    - cron: "17 10 * * 1-5" # 19:17 KST
    - cron: "53 12 * * 1-5" # 21:53 KST
  workflow_dispatch:
    inputs:
      refresh_financials:
        description: "재무 데이터(분기 1회)도 갱신할지"
        type: boolean
        default: false

permissions:
  contents: write

# 크론이 지연되면 두 실행이 겹칠 수 있다. 겹치면 둘 다 커밋을 만들어 뒤쪽
# push가 non-fast-forward로 실패한다. 취소하지 않고 줄 세워서 직렬화한다
# (대기 중인 실행은 앞 실행이 끝난 뒤 체크아웃하므로 항상 최신 기준이다).
concurrency:
  group: build-screener-json
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 재무 갱신을 명시적으로 요청했다면 새 시세가 없어도 다시 빌드해야 한다
      # (financials.json이 바뀌면 PBR·PER이 달라지므로).
      FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_financials }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Refresh financials (manual, quarterly)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_financials }}
        working-directory: pipeline
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python fetch_financials.py

      # 빌드가 덮어쓰기 전의 기준일을 기록해 둔다. 신선도 검증은 커밋 이후에
      # 돌기 때문에, 그때 HEAD를 보면 이미 새 파일이라 비교가 무의미해진다.
      - name: Record previous base_date
        run: |
          prev=$(python -c "import json;print(json.load(open('docs/screener.json',encoding='utf-8'))['meta']['base_date'])" 2>/dev/null || echo "")
          echo "이전 기준일: ${prev:-(없음)}"
          echo "PREVIOUS_BASE_DATE=$prev" >> "$GITHUB_ENV"

      # 하루 4회 중 대부분은 '이미 최신'이다. 그때마다 전종목을 재수집해 커밋하면
      # updated_at만 바뀐 커밋이 쌓여 리포가 불필요하게 커진다. basDt별 건수만
      # 싸게 확인해 새 데이터가 있을 때만 빌드한다.
      - name: Check for new data
        id: check
        working-directory: pipeline
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python check_new_data.py

      - name: Build screener.json
        if: steps.check.outputs.has_new == 'true' || env.FORCE_BUILD == 'true'
        working-directory: pipeline
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python build_json.py

      - name: Commit & push
        if: steps.check.outputs.has_new == 'true' || env.FORCE_BUILD == 'true'
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/screener.json data/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀 (기준일이 갱신되지 않았을 수 있음)"
          else
            git commit -m "chore: update screener.json"
            git push
          fi

      # 빌드 성공 != 새 데이터. 업스트림이 신규 영업일 시세를 안 올리면 지난 기준일로
      # 조용히 성공하므로, 기준일을 잡 요약에 노출하고 비정상 지연이면 실패시킨다.
      # 커밋 뒤에 두는 이유: 이 스텝이 실패해도 실제로 진전된 데이터는 이미
      # 배포되게 하려는 것. 게이트가 아니라 알림이다.
      - name: Verify data freshness
        working-directory: pipeline
        run: python verify_freshness.py
