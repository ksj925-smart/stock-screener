# 평일 14:30 KST(= 05:30 UTC) — 공공데이터 갱신(영업일 하루 뒤 13시 이후) 확보 보장 (SPEC 7장)
name: build-screener-json

on:
  schedule:
    - cron: "30 5 * * 1-5"
  workflow_dispatch:
    inputs:
      refresh_financials:
        description: "재무 데이터(분기 1회)도 갱신할지"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Refresh financials (manual, quarterly)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_financials }}
        working-directory: pipeline
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python fetch_financials.py

      # 빌드가 덮어쓰기 전의 기준일을 기록해 둔다. 신선도 검증은 커밋 이후에
      # 돌기 때문에, 그때 HEAD를 보면 이미 새 파일이라 비교가 무의미해진다.
      - name: Record previous base_date
        run: |
          prev=$(python -c "import json;print(json.load(open('docs/screener.json',encoding='utf-8'))['meta']['base_date'])" 2>/dev/null || echo "")
          echo "이전 기준일: ${prev:-(없음)}"
          echo "PREVIOUS_BASE_DATE=$prev" >> "$GITHUB_ENV"

      - name: Build screener.json
        working-directory: pipeline
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python build_json.py

      - name: Commit & push
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/screener.json data/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀 (기준일이 갱신되지 않았을 수 있음)"
          else
            git commit -m "chore: update screener.json"
            git push
          fi

      # 빌드 성공 != 새 데이터. 업스트림이 신규 영업일 시세를 안 올리면 지난 기준일로
      # 조용히 성공하므로, 기준일을 잡 요약에 노출하고 비정상 지연이면 실패시킨다.
      # 커밋 뒤에 두는 이유: 이 스텝이 실패해도 실제로 진전된 데이터는 이미
      # 배포되게 하려는 것. 게이트가 아니라 알림이다.
      - name: Verify data freshness
        working-directory: pipeline
        run: python verify_freshness.py
